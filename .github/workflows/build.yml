name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run verification
        run: ./gradlew spotlessCheck :common:1_21_1:test compileMatrix

  matrix-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fabric-1.20.1
            task: ':fabric:1_20_1:build'
            artifact: fabric-1_20_1
          - name: forge-1.20.1
            task: ':forge:1_20_1:build'
            artifact: forge-1_20_1
          - name: fabric-1.20.2
            task: ':fabric:1_20_2:build'
            artifact: fabric-1_20_2
          - name: forge-1.20.2
            task: ':forge:1_20_2:build'
            artifact: forge-1_20_2
          - name: fabric-1.20.3
            task: ':fabric:1_20_3:build'
            artifact: fabric-1_20_3
          - name: forge-1.20.3
            task: ':forge:1_20_3:build'
            artifact: forge-1_20_3
          - name: fabric-1.20.4
            task: ':fabric:1_20_4:build'
            artifact: fabric-1_20_4
          - name: forge-1.20.4
            task: ':forge:1_20_4:build'
            artifact: forge-1_20_4
          - name: fabric-1.20.5
            task: ':fabric:1_20_5:build'
            artifact: fabric-1_20_5
          - name: fabric-1.20.6
            task: ':fabric:1_20_6:build'
            artifact: fabric-1_20_6
          - name: neoforge-1.20.6
            task: ':neoforge:1_20_6:build'
            artifact: neoforge-1_20_6
          - name: fabric-1.21
            task: ':fabric:1_21:build'
            artifact: fabric-1_21
          - name: neoforge-1.21
            task: ':neoforge:1_21:build'
            artifact: neoforge-1_21
          - name: fabric-1.21.1
            task: ':fabric:1_21_1:build'
            artifact: fabric-1_21_1
          - name: neoforge-1.21.1
            task: ':neoforge:1_21_1:build'
            artifact: neoforge-1_21_1
          - name: fabric-1.21.2
            task: ':fabric:1_21_2:build'
            artifact: fabric-1_21_2
          - name: neoforge-1.21.2
            task: ':neoforge:1_21_2:build'
            artifact: neoforge-1_21_2
          - name: fabric-1.21.3
            task: ':fabric:1_21_3:build'
            artifact: fabric-1_21_3
          - name: neoforge-1.21.3
            task: ':neoforge:1_21_3:build'
            artifact: neoforge-1_21_3
          - name: fabric-1.21.4
            task: ':fabric:1_21_4:build'
            artifact: fabric-1_21_4
          - name: neoforge-1.21.4
            task: ':neoforge:1_21_4:build'
            artifact: neoforge-1_21_4
          - name: fabric-1.21.5
            task: ':fabric:1_21_5:build'
            artifact: fabric-1_21_5
          - name: neoforge-1.21.5
            task: ':neoforge:1_21_5:build'
            artifact: neoforge-1_21_5
          - name: fabric-1.21.6
            task: ':fabric:1_21_6:build'
            artifact: fabric-1_21_6
          - name: neoforge-1.21.6
            task: ':neoforge:1_21_6:build'
            artifact: neoforge-1_21_6
          - name: fabric-1.21.7
            task: ':fabric:1_21_7:build'
            artifact: fabric-1_21_7
          - name: neoforge-1.21.7
