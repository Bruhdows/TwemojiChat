            artifact: neoforge-1_21_7
          - name: fabric-1.21.8
            task: ':fabric:1_21_8:build'
            artifact: fabric-1_21_8
          - name: neoforge-1.21.8
            task: ':neoforge:1_21_8:build'
            artifact: neoforge-1_21_8
          - name: fabric-1.21.9
            task: ':fabric:1_21_9:build'
            artifact: fabric-1_21_9
          - name: neoforge-1.21.9
            task: ':neoforge:1_21_9:build'
            artifact: neoforge-1_21_9
          - name: fabric-1.21.10
            task: ':fabric:1_21_10:build'
            artifact: fabric-1_21_10
          - name: neoforge-1.21.10
            task: ':neoforge:1_21_10:build'
            artifact: neoforge-1_21_10
          - name: fabric-1.21.11
            task: ':fabric:1_21_11:build'
            artifact: fabric-1_21_11
          - name: neoforge-1.21.11
            task: ':neoforge:1_21_11:build'
            artifact: neoforge-1_21_11
          - name: fabric-26.1
            task: ':fabric:26_1:build'
            artifact: fabric-26_1
          - name: neoforge-26.1
            task: ':neoforge:26_1:build'
            artifact: neoforge-26_1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ${{ matrix.name }}
        run: ./gradlew ${{ matrix.task }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twemojichat-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}/*/build/libs/*.jar
          retention-days: 14
