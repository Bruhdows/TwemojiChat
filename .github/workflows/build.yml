name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run verification
        run: ./gradlew spotlessCheck :common:1_21_1:test compileMatrix

  matrix-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: fabric-1.20.1
            java: '21'
            task: ':fabric:1_20_1:build'
          - name: forge-1.20.1
            java: '21'
            task: ':forge:1_20_1:build'
          - name: fabric-1.21.1
            java: '21'
            task: ':fabric:1_21_1:build'
          - name: neoforge-1.21.1
            java: '21'
            task: ':neoforge:1_21_1:build'
          - name: fabric-1.21.11
            java: '21'
            task: ':fabric:1_21_11:build'
          - name: neoforge-1.21.11
            java: '21'
            task: ':neoforge:1_21_11:build'
          - name: fabric-26.1
            java: '25'
            task: ':fabric:26_1:build'
          - name: neoforge-26.1
            java: '25'
            task: ':neoforge:26_1:build'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build ${{ matrix.name }}
        run: ./gradlew ${{ matrix.task }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twemojichat-${{ matrix.name }}-${{ github.sha }}
          path: |
            fabric/*/build/libs/*.jar
            forge/*/build/libs/*.jar
            neoforge/*/build/libs/*.jar
          retention-days: 14
